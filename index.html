<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szablon Drużyny - Strona główna</title>
    <!-- Zoptymalizowane ładowanie fontów -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Dodatkowe, specyficzne dla strony głównej style w celu urozmaicenia */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 999px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            background-color: var(--color-gold-base);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--color-gold-base);
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            background-color: var(--text-primary);
            color: var(--bg-base);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            border-radius: 12px;
            margin-top: 3rem;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast), background-color var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            background-color: var(--color-gold-base);
            /* Transformuje w złoty przy najechaniu */
            color: #ffffff;
        }
    </style>
<link rel="icon" type="image/png" href="lofoo.png">
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <!-- Zmodernizowana sekcja Hero -->
        <section class="hero">
            <div class="badge">
                <span class="badge-dot"></span> 5 Warszawska Drużyna Harcerzy
            </div>
            <h1>5 WDH ,,Złota Piątka''</h1>
            <p></p>

            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <a href="kontakt.html" class="cta-button">Dołącz do nas</a>
                <a href="kronika.html" class="cta-button"
                    style="background-color: transparent; border: 2px solid var(--text-primary); color: var(--text-primary);">Zobacz
                    kronikę</a>
            </div>
        </section>


    </main>

    <div id="footer-placeholder"></div>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>

</html>
