<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumenty - Szablon Drużyny</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 8rem 2rem 5rem;
            text-align: center;
            background: linear-gradient(180deg, var(--hero-glow) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .document-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .document-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-surface-hover);
            border: 1px solid var(--border-subtle);
            padding: 1.25rem 1.5rem;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            color: var(--text-primary);
            text-decoration: none;
        }

        .document-item:hover {
            border-color: var(--color-gold-base);
            box-shadow: var(--shadow-sm);
            transform: translateX(5px);
        }

        .document-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .document-icon {
            color: var(--color-gold-base);
        }

        .document-meta {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            display: block;
            margin-top: 0.2rem;
        }

        .download-btn {
            background-color: var(--bg-base);
            border: 1px solid var(--border-subtle);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition-fast);
        }

        .document-item:hover .download-btn {
            border-color: var(--color-gold-base);
            background-color: var(--color-gold-base);
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="page-header">
            <h1>Dokumenty</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">Wzory zgód i
                deklaracje członkowskie do pobrania w formacie PDF.</p>
        </div>

        <section class="content" style="max-width: 800px;">
            <div class="card" style="text-align: left; padding: 3rem;">
                <h2 style="font-size: 1.6rem; margin-bottom: 1.5rem;">Baza plików</h2>

                <div class="document-list">
                    <a href="#" class="document-item">
                        <div class="document-info">
                            <svg class="document-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                            <div>
                                <strong style="font-weight: 500;">Deklaracja Czionkowska (dla osoby
                                    niepełnoletniej)</strong>
                                <span class="document-meta">PDF • 120 KB</span>
                            </div>
                        </div>
                        <div class="download-btn">
                            Pobierz
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </div>
                    </a>

                    <a href="#" class="document-item">
                        <div class="document-info">
                            <svg class="document-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                            <div>
                                <strong style="font-weight: 500;">Zgoda na biwak 24.08.2026</strong>
                                <span class="document-meta">PDF • 85 KB</span>
                            </div>
                        </div>
                        <div class="download-btn">
                            Pobierz
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </div>
                    </a>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>

</html>
