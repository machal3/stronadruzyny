<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zastępy - Szablon Drużyny</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 8rem 2rem 5rem;
            text-align: center;
            background: linear-gradient(180deg, var(--hero-glow) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            background: var(--gradient-text);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .patrol-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .patrol-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 2rem;
            text-align: center;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }

        .patrol-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-gold-base);
        }

        .patrol-color-indicator {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg);
        }

        .patrol-color-indicator svg {
            transform: rotate(-45deg);
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="page-header">
            <h1>Zastępy</h1>
        </div>

        <section class="content" style="max-width: 1000px;">
            <div class="patrol-grid">

                <div class="patrol-card">
                    <div class="patrol-color-indicator"
                        style="background: linear-gradient(135deg, #8b5a2b, #6f4518); box-shadow: 0 4px 15px rgba(139, 90, 43, 0.25);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 18v-7l2-3 3 2 3-2 2 3v7"></path>
                            <path d="M9 8 8 5"></path>
                            <path d="M15 8l1-3"></path>
                            <circle cx="9.5" cy="13" r="1"></circle>
                            <circle cx="14.5" cy="13" r="1"></circle>
                            <path d="M11 15h2l-1 1.5-1-1.5z"></path>
                        </svg>
                    </div>
                    <h3 style="font-size: 1.4rem; color: var(--text-primary); margin-bottom: 0.5rem;">Zastęp Zastępowych
                    </h3>
                    <p style="font-size: 0.95rem; color: var(--text-secondary);">Zastęp złożony z zastępowych</p>
                </div>

                <div class="patrol-card">
                    <div class="patrol-color-indicator"
                        style="background: linear-gradient(135deg, #f97316, #ea580c); box-shadow: 0 4px 15px rgba(249, 115, 22, 0.25);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 18v-6l2-4 3 2 3-2 2 4v6"></path>
                            <path d="M9 8 8 5"></path>
                            <path d="M15 8l1-3"></path>
                            <circle cx="9.5" cy="13" r="1"></circle>
                            <circle cx="14.5" cy="13" r="1"></circle>
                            <path d="M10 15c1 1 3 1 4 0"></path>
                            <path d="M8 15l-2 1"></path>
                            <path d="M16 15l2 1"></path>
                        </svg>
                    </div>
                    <h3 style="font-size: 1.4rem; color: var(--text-primary); margin-bottom: 0.5rem;">Rysie
                    </h3>
                    <p style="font-size: 0.95rem; color: var(--text-secondary);">Zastęp dla harcerzy z klas 7-8 KZE.</p>
                </div>

                <div class="patrol-card">
                    <div class="patrol-color-indicator"
                        style="background: linear-gradient(135deg, #dc2626, #b91c1c); box-shadow: 0 4px 15px rgba(220, 38, 38, 0.25);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="7" r="2"></circle>
                            <circle cx="12" cy="12.5" r="2.5"></circle>
                            <circle cx="12" cy="18" r="2"></circle>
                            <path d="M10.5 6 8.5 4.5"></path>
                            <path d="M13.5 6l2-1.5"></path>
                            <path d="M9.5 11l-3-2"></path>
                            <path d="M14.5 11l3-2"></path>
                            <path d="M9.5 14l-3 2"></path>
                            <path d="M14.5 14l3 2"></path>
                        </svg>
                    </div>
                    <h3 style="font-size: 1.4rem; color: var(--text-primary); margin-bottom: 0.5rem;">Bataliony</h3>
                    <p style="font-size: 0.95rem; color: var(--text-secondary);">Zastęp działający przy SP 386.</p>
                </div>

                <div class="patrol-card">
                    <div class="patrol-color-indicator"
                        style="background: linear-gradient(135deg, #2563eb, #1d4ed8); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.25);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 17c2-6 6-10 13-10-1 2-2 3.5-3.5 5H18l-4 4H9"></path>
                            <path d="M13 10h.01"></path>
                            <path d="M8 18l2-2"></path>
                        </svg>
                    </div>
                    <h3 style="font-size: 1.4rem; color: var(--text-primary); margin-bottom: 0.5rem;">Jastrzębie
                    </h3>
                    <p style="font-size: 0.95rem; color: var(--text-secondary);">Zastęp dla harcerzy z 5 klasy KZE.</p>
                </div>

                <div class="patrol-card">
                    <div class="patrol-color-indicator"
                        style="background: linear-gradient(135deg, #16a34a, #15803d); box-shadow: 0 4px 15px rgba(22, 163, 74, 0.25);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 17v-4l2-3h6l2 3v4"></path>
                            <path d="M9 10 6 7"></path>
                            <path d="M15 10l3-3"></path>
                            <path d="M8 10 6 10"></path>
                            <path d="M16 10h2"></path>
                            <circle cx="10" cy="14" r="1"></circle>
                            <circle cx="14" cy="14" r="1"></circle>
                            <path d="M11 16h2"></path>
                            <path d="M9 17v2"></path>
                            <path d="M15 17v2"></path>
                        </svg>
                    </div>
                    <h3 style="font-size: 1.4rem; color: var(--text-primary); margin-bottom: 0.5rem;">Żubry</h3>
                    <p style="font-size: 0.95rem; color: var(--text-secondary);">Zastęp dla harcerzy z 4 klasy KZE.</p>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>

</html>
