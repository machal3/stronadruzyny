<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Szablon Drużyny</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 8rem 2rem 5rem;
            text-align: center;
            background: linear-gradient(180deg, var(--hero-glow) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .contact-box {
            padding: 2rem;
            border-radius: var(--radius-md);
            background-color: var(--bg-surface-hover);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--color-gold-base);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(176, 141, 68, 0.3);
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="page-header">
            <h1>Kontakt</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">Napisz do nas
                lub zadzwoń. Odpowiadamy z harcerską prędkością.</p>
        </div>

        <section class="content" style="max-width: 900px;">
            <div class="card" style="text-align: left; padding: 3rem;">
                <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">Dane kontaktowe</h2>
                <p style="font-size: 1.05rem; line-height: 1.7; color: var(--text-secondary);">Masz pytania dotyczące
                    zbiórek, obozów lub dołączenia do naszej drużyny? Wybierz najwygodniejszą formę kontaktu.</p>

                <div class="contact-grid">
                    <div class="contact-box">
                        <div class="icon-wrapper">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                </path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                        </div>
                        <div>
                            <span
                                style="display: block; font-size: 0.85rem; color: var(--text-tertiary); text-transform: uppercase; font-weight: 600; letter-spacing: 1px;">Email</span>
                            <a href="mailto:kontakt@druzyna.zhp.pl"
                                style="color: var(--text-primary); text-decoration: none; font-weight: 500; font-size: 1.1rem;">kontakt@druzyna.zhp.pl</a>
                        </div>
                    </div>

                    <div class="contact-box">
                        <div class="icon-wrapper">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                                </path>
                            </svg>
                        </div>
                        <div>
                            <span
                                style="display: block; font-size: 0.85rem; color: var(--text-tertiary); text-transform: uppercase; font-weight: 600; letter-spacing: 1px;">Telefon
                                drużynowego</span>
                            <a href="tel:+48000000000"
                                style="color: var(--text-primary); text-decoration: none; font-weight: 500; font-size: 1.1rem;">+48
                                000 000 000</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>

</html>
