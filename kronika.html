<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronika - Szablon Drużyny</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 8rem 2rem 5rem;
            text-align: center;
            background: linear-gradient(180deg, var(--hero-glow) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="page-header">
            <h1>Kronika</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">Najważniejsze
                wydarzenia z życia naszej drużyny. Zobacz co robiliśmy w ostatnim czasie.</p>
        </div>

        <section class="content" style="max-width: 900px;">
            <!-- Admin Panel for adding posts -->
            <div class="card admin-panel"
                style="text-align: left; padding: 2rem; margin-bottom: 2rem; border-top: 4px solid var(--color-gold-base);">
                <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Panel Administracyjny (Wymaga Tokenu)</h2>
                <form id="kronika-form" style="display: flex; flex-direction: column; gap: 1rem;">

                    <input type="password" id="github-token" placeholder="GitHub Personal Access Token (PAT)"
                        style="width: 100%; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--border-strong); background: rgba(255, 0, 0, 0.05); color: var(--text-primary); font-family: inherit; font-family: monospace;">

                    <div style="display: flex; gap: 1rem; width: 100%;">
                        <input type="text" id="post-title" placeholder="Tytuł wpisu" required
                            style="flex-grow: 1; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--border-strong); background: var(--bg-base); color: var(--text-primary); font-family: inherit;">
                        <input type="text" id="post-date" placeholder="Data (np. 24 Sierpnia 2026)" required
                            style="flex-grow: 1; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--border-strong); background: var(--bg-base); color: var(--text-primary); font-family: inherit;">
                    </div>
                    <textarea id="post-content" rows="4" placeholder="Treść wpisu..." required
                        style="width: 100%; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--border-strong); background: var(--bg-base); color: var(--text-primary); font-family: inherit; resize: vertical;"></textarea>

                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <button type="submit" id="submit-btn"
                            style="padding: 0.8rem 1.5rem; border-radius: 8px; background: var(--color-gold-base); color: #fff; border: none; font-weight: 600; cursor: pointer; transition: opacity 0.2s;">
                            Dodaj do Kroniki
                        </button>
                        <span id="status-msg" style="font-size: 0.9rem; font-weight: 500;"></span>
                    </div>
                </form>
            </div>

            <!-- Kontener na wpisy -->
            <div id="posts-container" style="position: relative; min-height: 200px;">
                <!-- Loader -->
                <div id="loader"
                    style="text-align: center; color: var(--color-gold-base); padding: 3rem; display: none;">
                    Trwa ładowanie postów...
                </div>
                <!-- Wpisy będą tutaj renderowane przez JavaScript -->
            </div>

        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("kronika-form");
            const container = document.getElementById("posts-container");
            const loader = document.getElementById("loader");
            const statusMsg = document.getElementById("status-msg");
            const submitBtn = document.getElementById("submit-btn");

            // --- KONFIGURACJA GITHUB ---
            const OWNER = "machal3";
            const REPO = "stronadruzyny";
            const FILE_PATH = "kronika_posts.json";
            let fileSha = ""; // Wymagany do aktualizacji (Update) pliku przez API

            // Trzymamy pobrane posty w pamięci
            let loadedPosts = [];

            function setStatus(msg, color = "var(--text-secondary)") {
                statusMsg.textContent = msg;
                statusMsg.style.color = color;
            }

            // Dekodowanie Base64 (UTF-8 bezpieczne)
            function b64DecodeUnicode(str) {
                return decodeURIComponent(atob(str).split('').map(function (c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            }

            // Kodowanie Base64 (UTF-8 bezpieczne)
            function b64EncodeUnicode(str) {
                return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
                    function toSolidBytes(match, p1) {
                        return String.fromCharCode('0x' + p1);
                    }));
            }

            // 1. POBIERANIE DANYCH Z GITHUBA
            async function fetchPosts() {
                container.querySelectorAll('.card').forEach(e => e.remove());
                loader.style.display = "block";
                setStatus("");

                try {
                    // Cache buster by nie czytać przestarzałych danych
                    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}?t=${Date.now()}`;
                    const response = await fetch(url);

                    if (!response.ok) {
                        if (response.status === 404) {
                            loadedPosts = [];
                            renderPosts();
                            return;
                        }
                        throw new Error("Błąd pobierania bazy danych.");
                    }

                    const data = await response.json();
                    fileSha = data.sha; // Zachowujemy SHA do potencjalnych edycji

                    const contentJson = b64DecodeUnicode(data.content);
                    loadedPosts = JSON.parse(contentJson);

                    renderPosts();
                } catch (error) {
                    console.error(error);
                    setStatus("Błąd pobierania: " + error.message, "red");
                } finally {
                    loader.style.display = "none";
                }
            }

            // 2. EDYCJA I WYSYŁANIE NA GITHUBA
            async function updateGitHubFile(newPostsArray, commitMessage) {
                const token = document.getElementById("github-token").value.trim();
                if (!token) {
                    setStatus("Błąd: Wprowadź token PAT, aby zapisać zmiany!", "red");
                    return false;
                }

                submitBtn.disabled = true;
                setStatus("Wysyłanie na GitHuba...", "var(--color-gold-base)");

                const newContent = b64EncodeUnicode(JSON.stringify(newPostsArray, null, 4));

                try {
                    const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                        method: "PUT",
                        headers: {
                            "Authorization": `token ${token}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: commitMessage,
                            content: newContent,
                            sha: fileSha
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Błąd API: ${response.status}`);
                    }

                    setStatus("Sukces! Zmiany zapisane. Przeładuj stronę za ~30 sekund.", "green");

                    // Odśwież widok lokalny na podstawie sukcesu (i zaktualizuj SHA)
                    const data = await response.json();
                    fileSha = data.content.sha;
                    loadedPosts = newPostsArray;
                    renderPosts();
                    return true;

                } catch (error) {
                    console.error(error);
                    setStatus("Błąd zapisu! Niepoprawny token lub brak uprawnień.", "red");
                    return false;
                } finally {
                    submitBtn.disabled = false;
                }
            }

            // 3. RENDEROWANIE WPISÓW W DOM
            function renderPosts() {
                container.querySelectorAll('.card').forEach(e => e.remove());

                const postsToRender = [...loadedPosts];
                // Sortowanie pod ID zakłada że id to timestamp
                postsToRender.sort((a, b) => b.id - a.id);

                postsToRender.forEach(post => {
                    const postCard = document.createElement("div");
                    postCard.className = "card";
                    postCard.style.cssText = "text-align: left; padding: 3rem; margin-bottom: 2rem; position: relative;";

                    postCard.innerHTML = `
                        <button class="delete-btn" data-id="${post.id}" aria-label="Usuń wpis" title="Wymaga autoryzacji tokenem"
                            style="position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(255,0,0,0.1); color: red; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                        <span style="color: var(--color-gold-base); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">
                            ${post.date}
                        </span>
                        <h2 style="margin-top: 0.5rem; font-size: 2.2rem;">${post.title}</h2>
                        <div style="height: 4px; width: 40px; background-color: var(--color-gold-base); margin: 1.5rem 0; border-radius: 2px;"></div>
                        <p style="font-size: 1.1rem; line-height: 1.8; white-space: pre-wrap;">${post.content}</p>
                    `;
                    container.appendChild(postCard);
                });

                // Event listenery usuwania
                document.querySelectorAll(".delete-btn").forEach(btn => {
                    btn.addEventListener("click", async function () {
                        const token = document.getElementById("github-token").value.trim();
                        if (!token) {
                            alert("BŁĄD: Musisz najpierw wpisać Token (Hasło) w panelu wyżej, aby usuwać wpisy!");
                            return;
                        }

                        if (confirm("Czy na pewno chcesz usunąć ten wpis? Spowoduje to auto-commit do GitHuba.")) {
                            const idToDelete = this.getAttribute("data-id");
                            const updatedPosts = loadedPosts.filter(post => post.id !== idToDelete);
                            await updateGitHubFile(updatedPosts, `Usuń wpis Kroniki (ID: ${idToDelete})`);
                        }
                    });
                });
            }

            // Obsługa wysyłania formularza
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const title = document.getElementById("post-title").value.trim();
                const date = document.getElementById("post-date").value.trim();
                const content = document.getElementById("post-content").value.trim();

                const newPost = {
                    id: Date.now().toString(),
                    title: title,
                    date: date,
                    content: content
                };

                const updatedPosts = [...loadedPosts, newPost];

                const success = await updateGitHubFile(updatedPosts, `Dodaj wpis Kroniki: ${title}`);
                if (success) {
                    // Reset głównych pól (zachowaj token)
                    document.getElementById("post-title").value = "";
                    document.getElementById("post-date").value = "";
                    document.getElementById("post-content").value = "";
                }
            });

            // Start: Pobierz przy starcie
            fetchPosts();
        });
    </script>
</body>

</html>
